# ManageBeds — Architecture & Data Flow

> Hospital bed management module built with **Next.js**, **AWS Amplify Gen 2** (DynamoDB via \`client.models\`),
> **TanStack Table**, **shadcn/ui**, and **Sonner** toasts.

---

## 1. Project File Tree

\`\`\`text
ManageBeds/
├── ManageBedList.tsx                    ← Root "page" component (orchestrator)
│
├── hooks/
│   ├── useBeds.ts                       ← Fetches all beds from Amplify
│   ├── useBedFilter.tsx                 ← Search + filter logic (pure derived state)
│   └── useBedActions.tsx                ← All write actions + dialog state
│
└── components/
    ├── bedStatus.tsx                    ← Pure display: OCCUPIED / AVAILABLE badge
    │
    ├── forms/
    │   └── AddBedDialog.tsx             ← Self-contained "New Bed" form + dialog
    │
    ├── Filters/
    │   └── bedFilterdropdown.tsx        ← Status + RoomType filter dropdown
    │
    ├── tables/
    │   ├── bedTable.tsx                 ← TanStack Table shell + pagination
    │   └── coloumn.tsx                  ← Column definitions (reads meta callbacks)
    │
    └── dialogs/
        ├── allocateBedDialogs.tsx       ← Fetch available patients → assign to bed
        ├── DischargeDialog.tsx          ← Discharge form (medical + payment)
        └── patientDetailDialog.tsx      ← Read-only patient profile viewer
\`\`\`

---

## 2. Component Hierarchy

\`\`\`text
ManageBedList  (root, "use client")
│
│  reads:  useBeds()        → beds[], loading, fetchBeds()
│  reads:  useBedFilters()  → query, setQuery, filters, setFilters, filteredBeds[]
│  reads:  useBedActions()  → all dialog state + action handlers
│
├── <AddBedDialog onBedAdded={fetchBeds} />
│       self-managed local form state
│       writes: client.models.Bed.create(...)
│
├── <Input />  (search bar)
│       value={query}   onChange → setQuery()
│
├── <BedFilterDropdown filters={filters} onChange={setFilters} />
│
├── <BedTable beds={filteredBeds} onAllocate={openAllocate} onDischarge={openDischarge} ... />
│   └── <columns /> (via TanStack meta)
│       ├── Room, Bed, Type, Status columns
│       ├── Patient column → clickable name → meta.onViewPatient(bed.patient.id)
│       └── Actions column (Allocate, Discharge, Delete)
│
├── <AllocateBedDialog bedId={allocateBedId} onSuccess={fetchBeds} onClose={closeAllocate} />
├── <DischargeDialog bed={dischargeBed} form={dischargeForm} onUpdate={updateDischargeForm} />
└── <PatientDetailDialog patientId={viewPatientId} onClose={closeViewPatient} />
\`\`\`

---

## 3. Hook Responsibilities

### 3.1 \`useBeds.ts\`
\`\`\`typescript
useBeds()
│
│  State: beds[], loading
│  fetchBeds()
│  └── client.models.Bed.list({ selectionSet: [...] })
│  Returns: { beds, loading, fetchBeds }
\`\`\`

### 3.2 \`useBedFilter.tsx\`
\`\`\`typescript
useBedFilters(beds)
│
│  State: query, filters
│  filteredBeds = useMemo(() => beds.filter(...), [beds, query, filters])
│  Returns: { query, setQuery, filters, setFilters, filteredBeds }
\`\`\`

### 3.3 \`useBedActions.tsx\`
Manage global states for dialog orchestration.
\`\`\`typescript
useBedActions(onRefresh)
│
│  State: allocateBedId, dischargeBed, dischargeForm, viewPatientId, deletingId
│  Handlers: openAllocate, openDischarge, handleDischarge, handleDeleteBed
\`\`\`

---

## 4. Data Flow Examples

### 4.1 — "Allocate" Button Flow
\`\`\`text
USER clicks <UserPlus> icon -> meta?.onAllocate(bed.id)
-> openAllocate() -> setAllocateBedId()
-> <AllocateBedDialog open> fetches patients
-> USER selects patient and confirms
-> client.models.Bed.update({ isOccupied: true, assignedPatientId, admittedAt })
-> onSuccess() -> fetchBeds()
\`\`\`

### 4.2 — "Discharge" Button Flow
\`\`\`text
USER clicks <UserMinus> -> meta?.onDischarge(bed)
-> openDischarge() -> setDischargeBed(bed)
-> <DischargeDialog open={!!bed}>
-> USER fills form -> handleDischarge() 
-> client.models.Bed.update({ isOccupied: false, assignedPatientId: null, dischargedAt })
-> fetchBeds()
\`\`\`

### 4.3 — View Patient & Delete Bed
- **View Patient:** Click name -> \`meta.onViewPatient()\` -> Dialog component uses \`Patient.get({ id })\` to render read-only profile.
- **Delete Bed:** Click Trash -> \`handleDeleteBed()\` validates \`!isOccupied\` -> \`Bed.delete({ id })\` -> \`fetchBeds()\`.

---

## 5. Props Map — Every Prop Explained

### \`BedTable\` Props
| Prop | Type | Usage inside component |
|------|------|------------------------|
| \`beds\` | \`Bed[]\` | \`useReactTable({ data: beds })\` |
| \`onAllocate\` | \`function\` | Passed into \`table.options.meta.onAllocate\` |
| \`onDischarge\` | \`function\` | Passed into \`table.options.meta.onDischarge\` |
| \`onViewPatient\`| \`function\` | Passed into \`table.options.meta.onViewPatient\` |
| \`onDelete\` | \`function\` | Passed into \`table.options.meta.onDelete\` |
| \`deletingId\` | \`string \\| null\` | Passed into \`table.options.meta.deletingId\` |

### Dialog Props (Null-As-Gate Pattern)
All dialogs share the \`null\`-as-gate idiom: \`null\` = closed, value = open.
| Dialog Component | Prop Name | Render Guard Condition |
|------------------|-----------|------------------------|
| \`AllocateBedDialog\` | \`bedId\` | \`open={!!bedId}\` |
| \`DischargeDialog\` | \`bed\` | \`open={!!bed}\` |
| \`PatientDetailDialog\` | \`patientId\` | \`open={!!patientId}\` |

---

## 6. AWS Amplify Write Operations Summary

| Action | Model | Operation | Fields Written |
|--------|-------|-----------|----------------|
| Add Bed | \`Bed\` | \`.create()\` | roomNumber, bedNumber, roomType, isOccupied=false |
| Allocate | \`Bed\` | \`.update()\` | isOccupied=true, assignedPatientId, admittedAt |
| Discharge | \`Bed\` | \`.update()\` | isOccupied=false, assignedPatientId=null, dischargedAt |
| Delete | \`Bed\` | \`.delete()\` | id |

*Data optimized using explicit \`selectionSet\` targeting on reads to prevent over-fetching.*

---

## 7. State Ownership Summary
- **ManageBedList**: Coordinator — owns **no local state directly**.
- **useBeds / useBedFilters / useBedActions**: Owns server state, UI derived state, and interaction state.
- **AddBedDialog / AllocateBedDialog**: Contains fully self-contained local state for form inputs and selections.
`;

// Render logic using Marked.js
document.getElementById('markdown-container').innerHTML = marked.parse(documentContent);

// Add syntax highlighting to code blocks
document.querySelectorAll('pre code').forEach((block) => {
  hljs.highlightElement(block);
});

// Setup dynamic Sidebar Navigation
const navLinks = document.getElementById('nav-links');
const sections = document.querySelectorAll('#markdown-container h2');

sections.forEach((header, index) => {
  const idStr = 'section-' + index;
  header.id = idStr;

  const anchor = document.createElement('a');
  anchor.href = '#' + idStr;
  anchor.className = 'nav-item';
  // Strip starting text like "1. ", "5. " to make it elegant
  anchor.textContent = header.innerText.replace(/^[0-9.]+\s*/, '');
  
  anchor.addEventListener('click', (e) => {
    e.preventDefault();
    document.getElementById(idStr).scrollIntoView({ behavior: 'smooth' });
  });

  navLinks.appendChild(anchor);
});

// Highlight Active Nav Link on Scroll
const contentDiv = document.getElementById('content');
const allNavLinks = document.querySelectorAll('.nav-item');

contentDiv.addEventListener('scroll', () => {
  let currentSelectionId = null;
  sections.forEach(header => {
    const rect = header.getBoundingClientRect();
    // Offset tolerance for when header is visible in top segment
    if (rect.top >= 0 && rect.top <= 150) {
      currentSelectionId = header.id;
    }
  });
  
  if (currentSelectionId) {
    allNavLinks.forEach(link => {
      link.classList.toggle('active', link.getAttribute('href') === '#' + currentSelectionId);
    });
  }
});
</script>
